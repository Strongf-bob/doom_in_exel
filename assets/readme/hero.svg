<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Excel DOOM — a raycasting game built inside Excel</title>
  <desc id="desc">Spreadsheet cells transform into a first-person corridor with a crosshair, health, ammo, and an Excel green HUD.</desc>
  <rect width="1200" height="380" rx="18" fill="#07130B"/>
  <g stroke="#173820" stroke-width="1">
    <path d="M0 76H1200M0 152H1200M0 228H1200M0 304H1200"/>
    <path d="M120 0V380M240 0V380M360 0V380M480 0V380M600 0V380M720 0V380M840 0V380M960 0V380M1080 0V380"/>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="48" y="42" width="86" height="28" fill="#217346"/>
    <text x="61" y="62" fill="#E7F7E9" font-size="16" font-weight="800">XLSM</text>
    <text x="48" y="154" fill="#E7F7E9" font-size="72" font-weight="850" letter-spacing="-2">EXCEL DOOM</text>
    <text x="48" y="202" fill="#A6C9AE" font-size="25">VBA raycasting. Keyboard controls. Reproducible build.</text>
    <text x="48" y="302" fill="#7DA387" font-size="18" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">POWERSHELL + EXCEL COM → ExcelDoom.xlsm</text>
    <g transform="translate(770 44)">
      <path d="M170 0L8 292H332L170 0Z" fill="#102A18" stroke="#217346" stroke-width="3"/>
      <path d="M170 0V292M8 292L170 158L332 292" fill="none" stroke="#4E7F5A" stroke-width="2"/>
      <path d="M128 158H212M170 116V200" stroke="#D94841" stroke-width="4"/>
      <rect x="30" y="246" width="280" height="38" fill="#07130B" stroke="#B6A56A"/>
      <text x="46" y="272" fill="#E7F7E9" font-size="17" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">HP 100   AMMO 24   W A S D</text>
    </g>
  </g>
</svg>
